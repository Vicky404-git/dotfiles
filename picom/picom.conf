# --- Backend & Performance ---
# Use GLX (OpenGL) for hardware acceleration
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;
xrender-sync-fence = true;

# --- Shadows ---
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.5;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@"
];

# --- Corners ---
# Match your Hyprland 8px rounding
corner-radius = 8;
rounded-corners-exclude = [
    "class_g = 'Polybar'",
    "window_type = 'tooltip'"
];

# --- Blur & Transparency ---
blur-method = "dual_kawase";
blur-strength = 4;
blur-background = true;

# Set Kitty and Rofi to be slightly transparent so the blur shows through
opacity-rule = [
    "85:class_g = 'kitty'",
    "85:class_g = 'Rofi'"
];

blur-background-exclude = [
    "class_g = 'Polybar'",
    "_GTK_FRAME_EXTENTS@"
];
