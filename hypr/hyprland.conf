# ===========================================================================
# HYPRLAND CONFIGURATION (Translated from i3)
# ===========================================================================

# --- Set Windows/Super key as the main modifier ---
$mainMod = SUPER

# --- Monitors ---
# Automatically configure any connected display
monitor=,preferred,auto,1

# --- Autostart Applications ---
# Network and Bluetooth
exec-once = nm-applet &
exec-once = blueman-applet &

# Notification Daemon
exec-once = dunst

# Wallpaper (NOTE: feh does not work on Wayland. Use hyprpaper or swaybg)
exec-once = swaybg -i ~/Downloads/wallhaven1.png -m fill

# System Monitor Dashboard (Opens btop on boot)
exec-once = kitty -T "SystemMonitor" btop --utf-force

# --- Visuals (Gaps & Borders) ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # You can change these colors to match your aesthetic
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    
    # Hyprland uses the 'dwindle' layout by default
    layout = dwindle
}

# --- Picom Replacement (Hyprland Built-in Blur & Shadows) ---
decoration {
    rounding = 0
    drop_shadow = yes
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)

    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# --- Window Rules ---
# Force SystemMonitor to Workspace 5 and remove its borders
windowrulev2 = workspace 5, title:^(SystemMonitor)$
windowrulev2 = noborder, title:^(SystemMonitor)$

# --- Core Keybindings ---
# Terminal
bind = $mainMod, Return, exec, kitty

# App Launcher (Ensure you are using the Wayland fork of Rofi, or Wofi)
bind = $mainMod, D, exec, rofi -show drun

# Close Window
bind = $mainMod, Q, killactive

# Reload Config (Hyprland auto-reloads on save, but you can force it)
bind = $mainMod SHIFT, C, exec, hyprctl reload

# Floating Toggle
bind = $mainMod, V, togglefloating

# Launch Yazi File Manager
bind = $mainMod, E, exec, kitty -e yazi

# --- Focus Movement (Vim keys) ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# --- Move Focused Window ---
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# --- Tiling Modifiers ---
# In Hyprland's dwindle layout, splits are mostly automatic, but you can toggle split direction:
bind = $mainMod, B, togglesplit
bind = $mainMod SHIFT, V, togglesplit
# Fullscreen
bind = $mainMod, F, fullscreen

# --- The Scratchpad (Special Workspace) ---
bind = $mainMod SHIFT, S, movetoworkspace, special
bind = $mainMod, S, togglespecialworkspace

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move Windows to Workspaces ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# --- Utilities & Media ---
# Lock Screen (Make sure lock.sh works on Wayland, e.g., using swaylock)
bind = $mainMod, X, exec, ~/.config/i3/lock.sh

# Exit/Power Menu
bind = $mainMod SHIFT, E, exec, ~/.config/i3/powermenu.sh

# OBS Studio
bind = $mainMod, O, exec, obs

# Screenshots (NOTE: Flameshot struggles on Wayland. 'grimblast' or 'hyprshot' is highly recommended)
bind = , Print, exec, flameshot gui

# Hardware Controls (Volume & Brightness)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media Playback Controls
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioStop, exec, playerctl stop
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next
