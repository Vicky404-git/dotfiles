
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# ######################################################################################
#
#

# remove autogenerated line
# autogenerated = 1

$mod = SUPER

# terminal
bind = $mod, RETURN, exec, kitty

# app launcher
bind = $mod, D, exec, rofi -show drun

# close window
bind = $mod, Q, killactive

# reload config
bind = $mod SHIFT, R, exec, hyprctl reload

# floating toggle
bind = $mod, V, togglefloating

# Fullscreen screenshot
bind = $mod, Print, exec, grim ~/Pictures/screenshot_$(date +%F_%H-%M-%S).png

# Area screenshot
bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot_$(date +%F_%H-%M-%S).png


# focus movement
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# workspace switching
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

exec-once = waybar

# --- Layer Forging (Blurring the UI) ---
blurls = waybar
blurls = rofi

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(d79921ee) rgba(cc241dee) 45deg
    col.inactive_border = rgba(3c3836aa)
    layout = dwindle
}

decoration {
    rounding = 8
    dim_inactive = true
    dim_strength = 0.4
    blur {
        enabled = true
        size = 3
        passes = 2
    }
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}
animations {
    enabled = true

    # --- The Physics (Bezier Curves) ---
    # format: name, X0, Y0, X1, Y1
    bezier = heavyOak, 0.1, 1.1, 0.1, 1.0     
    bezier = parchment, 0.2, 0.8, 0.2, 1.0    
    bezier = forgeSteel, 0.05, 0.9, 0.1, 1.05 

    # --- The Spells (Applying the curves) ---
    animation = windows, 1, 6, heavyOak, popin 80%
    animation = windowsOut, 1, 5, heavyOak, popin 80%
    animation = border, 1, 10, forgeSteel
    animation = borderangle, 1, 8, default
    animation = fade, 1, 4, default
    animation = workspaces, 1, 6, parchment, slide
}

# --- Hardware Controls (Volume & Brightness) ---
bindel = , xf86audioraisevolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , xf86audiolowervolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , xf86audiomute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , xf86monbrightnessup, exec, brightnessctl set 5%+
bindel = , xf86monbrightnessdown, exec, brightnessctl set 5%-

# --- Media Playback Controls ---
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioStop, exec, playerctl stop
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioNext, exec, playerctl next

# --- The Scratchpad ---
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic




